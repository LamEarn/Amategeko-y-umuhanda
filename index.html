<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amategeko y'Umuhanda</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background: #0f172a; color: #fff; }
    .header { background: #1e40af; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
    .card { background: rgba(255,255,255,0.1); margin: 15px; padding: 20px; border-radius: 16px; }
    button { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 12px; font-size: 17px; }
    .primary { background: #22c55e; color: black; font-weight: bold; }
    .option { background: #334155; text-align: left; }
  </style>
</head>
<body>
  <div class="header">🚗 Amategeko y'Umuhanda</div>
  <div class="container" id="main"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();

    const ADMIN_ID = 8616193014;
    const userId = tg.initDataUnsafe?.user?.id || 8616193014;
    const isAdmin = userId === ADMIN_ID;

    // ================== SUPABASE KEYS (Shyira izawe) ==================
    const SUPABASE_URL = "https://geaqmxoqhijotswksiepp.supabase.co";
    const SUPABASE_ANON = "PASTE_FULL_PUBLISHABLE_KEY_HERE";   // ← SHYIRA KEY YAWE YOSE HANO

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    async function showMainMenu() {
      document.getElementById('main').innerHTML = `
        <div class="card" onclick="goTo('lessons')">📚 Amasomo y'Ibyapa</div>
        <div class="card" onclick="goTo('quiz')">❓ Quiz (5 ibibazo)</div>
        <div class="card" onclick="goTo('exam')">📝 Mock Exam (15 ibibazo)</div>
        <div class="card" onclick="goTo('premium')">💎 Premium</div>
        ${isAdmin ? `<div class="card" style="background:#22c55e;color:black" onclick="showAdminPanel()">👑 ADMIN PANEL</div>` : ''}
      `;
    }

    async function goTo(page) {
      if (page === 'quiz' || page === 'exam') {
        const limit = page === 'quiz' ? 5 : 15;
        const { data: questions, error } = await supabase
          .from('questions')
          .select('*')
          .limit(limit);

        if (error || !questions || questions.length === 0) {
          tg.showAlert("❌ No questions found. Admin should add some first.");
          return;
        }

        startRealQuiz(questions);
      } else if (page === 'premium') {
        tg.showAlert("💎 Premium: 5000 RWF → Pay to 706405 (Lambert) then send screenshot");
      } else {
        tg.showAlert("Coming soon...");
      }
    }

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    function startRealQuiz(questions) {
      currentQuestions = questions;
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion() {
      const q = currentQuestions[currentIndex];
      if (!q) return showResults();

      const options = q.options.split('\n').map(opt => opt.trim());

      let html = `<div class="card"><h3>\( {currentIndex + 1}/ \){currentQuestions.length}</h3><p>${q.question}</p>`;

      options.forEach(opt => {
        html += `<button class="option" onclick="selectAnswer('\( {opt[0]}')"> \){opt}</button>`;
      });

      html += `</div>`;
      document.getElementById('main').innerHTML = html;
    }

    function selectAnswer(chosen) {
      const q = currentQuestions[currentIndex];
      if (chosen === q.correct) score++;

      currentIndex++;
      if (currentIndex < currentQuestions.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      const percentage = Math.round((score / currentQuestions.length) * 100);
      document.getElementById('main').innerHTML = `
        <div class="card" style="text-align:center;">
          <h2>🎯 Results</h2>
          <h1>\( {score}/ \){currentQuestions.length} (${percentage}%)</h1>
          <p>${percentage >= 60 ? '✅ Congrats! You would pass the real exam!' : '📚 Keep practicing!'}</p>
          <button class="primary" onclick="showMainMenu()">Return to Menu</button>
        </div>`;
    }

    function showAdminPanel() {
      document.getElementById('main').innerHTML = `
        <div class="card">
          <h3>Add Question</h3>
          <textarea id="question" placeholder="Full Question" rows="3"></textarea>
          <textarea id="options" placeholder="A. Option 1\nB. Option 2\nC. Option 3\nD. Option 4" rows="5"></textarea>
          <input id="correct" placeholder="Correct Answer (A/B/C/D)" maxlength="1">
          <button class="primary" onclick="addQuestionToDB()">Save Question</button>
        </div>
        <button onclick="showMainMenu()">← Back</button>
      `;
    }

    async function addQuestionToDB() {
      const question = document.getElementById('question').value;
      const options = document.getElementById('options').value;
      const correct = document.getElementById('correct').value.toUpperCase();

      if (!question || !options || !correct) {
        tg.showAlert("❌ Fill all fields!");
        return;
      }

      const { error } = await supabase.from('questions').insert([{ question, options, correct }]);
      tg.showAlert(error ? "Error saving" : "✅ Question saved successfully!");
    }

    // Start App
    showMainMenu();
  </script>
</body>
</html>
