<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amategeko y'Umuhanda - Rwanda</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
      background: #0f172a; 
      color: #fff; 
      min-height: 100vh;
    }
    .header { 
      background: linear-gradient(135deg, #1e40af, #3b82f6); 
      padding: 20px; 
      text-align: center; 
      font-size: 20px; 
      font-weight: bold; 
    }
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { 
      background: #1e293b; 
      margin: 12px 0; 
      padding: 20px; 
      border-radius: 12px; 
      cursor: pointer;
      transition: background 0.3s;
      border: 1px solid #334155;
    }
    .card:hover { background: #334155; }
    button { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer;
      transition: opacity 0.3s;
    }
    button:active { opacity: 0.8; }
    .primary { background: #22c55e; color: white; }
    .option { background: #475569; color: white; text-align: left; }
    .correct { background: #22c55e !important; }
    .wrong { background: #ef4444 !important; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      margin: 16px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">🚗 Amategeko y'Umuhanda - Rwanda</div>
  <div class="container" id="main"></div>

  <script>
    // Telegram WebApp
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
    
    // Ibibazo by'urudaca (local questions)
    const LOCAL_QUESTIONS = [
      {
        question: "Iki kimenyetso gisobanura iki? 🛑",
        options: ["A. Hagarara", "B. Genda buhoro", "C. Komeza", "D. Hindukira"],
        correct: "A"
      },
      {
        question: "Umunara w'itara ritukura usobanura iki?",
        options: ["A. Hagarara", "B. Itegereze", "C. Genda", "D. Hindukira"],
        correct: "A"
      },
      {
        question: "Umuvuduko ntarengwa mu mujyi ni angahe?",
        options: ["A. 40 km/h", "B. 50 km/h", "C. 60 km/h", "D. 80 km/h"],
        correct: "C"
      },
      {
        question: "Ni nde ufite uburenganzira bwa mbere ku isangano?",
        options: ["A. Ufite akamenyetso ka STOP", "B. Uwari ubanza kugera", "C. Uva iburyo", "D. Umugenzi"],
        correct: "B"
      },
      {
        question: "Ugomba gukoresha urumuri rw'akazu ry'umuhondo ryerekana iki?",
        options: ["A. Imvura", "B. Ijoro", "C. Igihu", "D. Byose"],
        correct: "D"
      },
      {
        question: "Ni ryari wemerewe kurenga imodoka?",
        options: ["A. Ku murongo uhumeka", "B. Ku isangano", "C. Ku muhanda ugoramye", "D. Aho byose bitemewe"],
        correct: "A"
      },
      {
        question: "Ikimenyetso cy'umutuku ufashe umuhanda gisobanura iki?",
        options: ["A. Komeza", "B. Hagarara", "C. Itegereze", "D. Hindukira"],
        correct: "B"
      },
      {
        question: "Ugomba kugira ibyangombwa ibihe mu modoka?",
        options: ["A. Permisiyo gusa", "B. Assurance gusa", "C. Permisiyo n'Assurance", "D. Nta na kimwe"],
        correct: "C"
      },
      {
        question: "Itara ritukura ryaka rimwe risobanura iki?",
        options: ["A. Hagarara", "B. Itegereze", "C. Genda buhoro", "D. Hindukira"],
        correct: "A"
      },
      {
        question: "Ni gute ugomba gukora niba umuyobozi w'indorerezi akwereka akamenyetso ko uhagaze?",
        options: ["A. Komeza", "B. Hagarara", "C. Ihute", "D. Hindukira"],
        correct: "B"
      },
      {
        question: "Umuhanda ufite imirongo ibiri itubutse isobanura iki?",
        options: ["A. Urenga modoka", "B. Nturenga modoka", "C. Ihute", "D. Hagarara"],
        correct: "B"
      },
      {
        question: "Ni uwuhe munsi ushobora kubona traffic nyinshi mu mujyi?",
        options: ["A. Kuwa mbere", "B. Kuwa gatanu nimugoroba", "C. Ku cyumweru", "D. Buri munsi"],
        correct: "B"
      },
      {
        question: "Niba wabonye akamenyetso k'ishuri, ugomba gukora iki?",
        options: ["A. Genda buhoro", "B. Ihute", "C. Hagarara", "D. Hindukira"],
        correct: "A"
      },
      {
        question: "Ikibazo cya mbere ugomba gukora mbere yo gutwara imodoka ni iki?",
        options: ["A. Kureba mirongo", "B. Kureba amavuta", "C. Kwambara umukandara", "D. Kureba amadirishya"],
        correct: "C"
      },
      {
        question: "Ikimenyetso gifite ishusho y'umwana gisobanura iki?",
        options: ["A. Ishuri", "B. Ikinamico", "C. Aho abana bakinira", "D. Ikigo nderabuzima"],
        correct: "A"
      }
    ];
    
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let selectedAnswer = null;
    
    // ADMIN ID (ushobora guhindura uyu mubare)
    const ADMIN_ID = 8616193014;
    const userId = tg?.initDataUnsafe?.user?.id || ADMIN_ID;
    const isAdmin = userId === ADMIN_ID;
    
    // Show main menu
    function showMainMenu() {
      const html = `
        <div class="card" onclick="goTo('lessons')">
          <h3>📚 Amasomo y'Ibyapa</h3>
          <p style="color: #94a3b8; margin-top: 8px;">Menya ibimenyetso by'umuhanda</p>
        </div>
        <div class="card" onclick="goTo('quiz')">
          <h3>❓ Quiz (5 ibibazo)</h3>
          <p style="color: #94a3b8; margin-top: 8px;">Ikizamini kigufi cyo kwitoza</p>
        </div>
        <div class="card" onclick="goTo('exam')">
          <h3>📝 Mock Exam (15 ibibazo)</h3>
          <p style="color: #94a3b8; margin-top: 8px;">Ikizamini gishyitse nk'icy'ukuri</p>
        </div>
        <div class="card" onclick="goTo('premium')">
          <h3>💎 Premium</h3>
          <p style="color: #94a3b8; margin-top: 8px;">Fungura ibindi bintu byose</p>
        </div>
        ${isAdmin ? `
          <div class="card" style="background: #22c55e;" onclick="showAdminPanel()">
            <h3>👑 ADMIN PANEL</h3>
            <p style="color: #fff; margin-top: 8px;">Genzura ibibazo</p>
          </div>
        ` : ''}
        <div style="margin-top: 20px; padding: 12px; text-align: center; color: #94a3b8; font-size: 12px;">
          Ibibazo ${LOCAL_QUESTIONS.length} birahari
        </div>
      `;
      
      document.getElementById('main').innerHTML = html;
    }
    
    // Go to section
    window.goTo = function(page) {
      if (page === 'quiz' || page === 'exam') {
        // Shakisha ibibazo
        const limit = page === 'quiz' ? 5 : 15;
        
        // Hitamo ibibazo bidahuje (random)
        const shuffled = [...LOCAL_QUESTIONS].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, Math.min(limit, LOCAL_QUESTIONS.length));
        
        if (selected.length === 0) {
          alert("❌ Nta bibazo bihari!");
          showMainMenu();
          return;
        }
        
        startQuiz(selected);
      } else if (page === 'premium') {
        const msg = "💎 Premium Access: 5,000 RWF\n\nIshyura ukoresheje MTN MoMo:\n*182*8*1*0706405# (Lambert)\n\nNyuma yo kwishyura, ohereza screenshot kuri WhatsApp";
        if (tg) {
          tg.showAlert(msg);
        } else {
          alert(msg);
        }
      } else if (page === 'lessons') {
        showLessons();
      }
    };
    
    // Show lessons
    function showLessons() {
      document.getElementById('main').innerHTML = `
        <div class="card">
          <h3>📚 Ibimenyetso by'Umuhanda</h3>
          <p style="margin: 16px 0;">Hari ubwoko butatu bw'ibimenyetso:</p>
          <ul style="margin-left: 20px; line-height: 1.8;">
            <li><strong style="color: #ef4444;">Umutuku</strong> - Itegeko ntarengwa (STOP, ntiwinjire)</li>
            <li><strong style="color: #fbbf24;">Umuhondo</strong> - Iburira (ishuri, gukata neza)</li>
            <li><strong style="color: #3b82f6;">Ubururu</strong> - Amakuru (hospital, parking)</li>
          </ul>
        </div>
        
        <div class="card">
          <h3>🚦 Amatara y'Umuhanda</h3>
          <ul style="margin-left: 20px; line-height: 1.8;">
            <li>🔴 <strong>Umutuku</strong> - Hagarara</li>
            <li>🟡 <strong>Umuhondo</strong> - Itegereze (niba bishoboka, hagarara)</li>
            <li>🟢 <strong>Icyatsi</strong> - Genda</li>
          </ul>
        </div>
        
        <div class="card">
          <h3>⚡ Umuvuduko Ntarengwa</h3>
          <ul style="margin-left: 20px; line-height: 1.8;">
            <li>Mu mujyi: <strong>60 km/h</strong></li>
            <li>Mu nzira nyabagendwa: <strong>80 km/h</strong></li>
            <li>Ahantu h'abantu benshi: <strong>40 km/h</strong></li>
          </ul>
        </div>
        
        <button class="primary" onclick="showMainMenu()">← Subira Ahabanza</button>
      `;
    }
    
    // Start quiz
    function startQuiz(questions) {
      currentQuestions = questions;
      currentIndex = 0;
      score = 0;
      selectedAnswer = null;
      showQuestion();
    }
    
    // Show question
    function showQuestion() {
      const q = currentQuestions[currentIndex];
      const progress = ((currentIndex) / currentQuestions.length) * 100;
      
      let html = `
        <div class="card">
          <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
            <span style="color: #94a3b8;">Ikibazo ${currentIndex + 1}/${currentQuestions.length}</span>
            <span style="color: #3b82f6;">Amanota: ${score}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
          <h3 style="margin: 20px 0;">${q.question}</h3>
      `;
      
      q.options.forEach((opt, idx) => {
        const letter = String.fromCharCode(65 + idx);
        html += `<button class="option" onclick="selectAnswer('${letter}', this)">${opt}</button>`;
      });
      
      html += `
          <div style="margin-top: 20px;">
            <button class="primary" onclick="nextQuestion()" id="nextBtn" style="display: none;">Komeza →</button>
          </div>
        </div>
      `;
      
      document.getElementById('main').innerHTML = html;
    }
    
    // Select answer
    window.selectAnswer = function(answer, btn) {
      if (selectedAnswer !== null) return; // Yaramaze guhitamo
      
      selectedAnswer = answer;
      const q = currentQuestions[currentIndex];
      const isCorrect = answer === q.correct;
      
      if (isCorrect) {
        score++;
        btn.classList.add('correct');
      } else {
        btn.classList.add('wrong');
        // Erekana igisubizo cy'ukuri
        const options = document.querySelectorAll('.option');
        q.options.forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          if (letter === q.correct) {
            options[idx].classList.add('correct');
          }
        });
      }
      
      // Hisha buttons z'ibisubizo
      document.querySelectorAll('.option').forEach(b => {
        b.disabled = true;
        b.style.cursor = 'not-allowed';
      });
      
      // Erekana button ya "Komeza"
      document.getElementById('nextBtn').style.display = 'block';
    };
    
    // Next question
    window.nextQuestion = function() {
      currentIndex++;
      
      if (currentIndex < currentQuestions.length) {
        selectedAnswer = null;
        showQuestion();
      } else {
        showResults();
      }
    };
    
    // Show results
    function showResults() {
      const percent = Math.round((score / currentQuestions.length) * 100);
      const passed = percent >= 60;
      
      let message = '';
      if (passed) {
        message = '✅ Watsinze! Ufite amanota ahagije yo gutsindira ikizamini nyacyo!';
      } else {
        message = '📚 Komeza wige! Ukeneye byibuze 60% ngo utsinde.';
      }
      
      document.getElementById('main').innerHTML = `
        <div class="card" style="text-align: center;">
          <h2 style="margin-bottom: 20px;">🎯 Ibisubizo byawe</h2>
          <div style="font-size: 64px; font-weight: bold; color: ${passed ? '#22c55e' : '#ef4444'}; margin: 20px 0;">
            ${score}/${currentQuestions.length}
          </div>
          <p style="font-size: 28px; margin: 16px 0; color: ${passed ? '#22c55e' : '#ef4444'};">
            ${percent}%
          </p>
          <p style="margin: 20px 0; line-height: 1.6;">
            ${message}
          </p>
          <button class="primary" onclick="showMainMenu()">← Subira Ahabanza</button>
          <button class="option" style="text-align: center; margin-top: 12px;" onclick="startQuiz(currentQuestions)">🔄 Ongera Ugerageze</button>
        </div>
      `;
    }
    
    // Admin panel
    window.showAdminPanel = function() {
      document.getElementById('main').innerHTML = `
        <div class="card">
          <h3>📊 Statistiki</h3>
          <p style="margin: 16px 0;">Ibibazo bihari: <strong>${LOCAL_QUESTIONS.length}</strong></p>
          <p style="color: #94a3b8;">Kugira ngo wongere ibibazo bishya, ukeneye gukoresha Supabase.</p>
        </div>
        
        <div class="card">
          <h3>ℹ️ Amakuru</h3>
          <p>User ID: ${userId}</p>
          <p>Admin: ${isAdmin ? 'Yego' : 'Oya'}</p>
        </div>
        
        <button class="primary" onclick="showMainMenu()">← Subira Ahabanza</button>
      `;
    };
    
    // Make functions global
    window.showMainMenu = showMainMenu;
    window.startQuiz = startQuiz;
    
    // Start the app
    showMainMenu();
  </script>
</body>
</html>
