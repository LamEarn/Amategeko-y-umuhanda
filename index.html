<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Amategeko y'Umuhanda - Rwanda</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff; 
      min-height: 100vh;
    }
    .header { 
      background: linear-gradient(135deg, #1e40af, #3b82f6); 
      padding: 20px; 
      text-align: center; 
      font-size: 20px; 
      font-weight: bold;
    }
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { 
      background: rgba(30, 41, 59, 0.9);
      margin: 12px 0; 
      padding: 20px; 
      border-radius: 16px; 
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .card:hover { 
      background: rgba(51, 65, 85, 1);
      transform: translateY(-2px);
    }
    button { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer;
    }
    .primary { 
      background: linear-gradient(135deg, #22c55e, #16a34a); 
      color: white; 
    }
    .option { 
      background: #475569; 
      color: white; 
      text-align: left;
      padding: 16px;
    }
    .correct { background: #22c55e !important; }
    .wrong { background: #ef4444 !important; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      margin: 16px 0;
    }
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      width: 0%;
    }
    .loading {
      text-align: center;
      padding: 40px;
    }
    .error-box {
      background: rgba(220, 38, 38, 0.2);
      border: 1px solid #dc2626;
      padding: 16px;
      border-radius: 12px;
      margin: 16px 0;
    }
    .success-box {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      padding: 16px;
      border-radius: 12px;
      margin: 16px 0;
    }
    textarea, input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">🚗 Amategeko y'Umuhanda - Rwanda</div>
  <div class="container" id="main">
    <div class="loading">
      <p>⏳ Tugerageza kwihuza na Database...</p>
    </div>
  </div>

  <script>
    (function() {
      // Telegram
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }
      
      // Supabase Config - Koresha URL nshya yawe!
      const SUPABASE_URL = "https://igcaqhepqtzogxfbekqs.supabase.co";
      const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnY2FxaGVwcXR6b2d4ZmJla3FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUwNDc2MDAsImV4cCI6MjA2MDYyMzYwMH0.ujH2kG3LxQm7PZD8N1WvKqR5vCxYwM8PJ9nF2tB4s6A"; // Ukeneye guhindura iyi KEY ukoresheje ANON KEY nshya!
      
      let supabase;
      let currentQuestions = [];
      let currentIndex = 0;
      let score = 0;
      let selectedAnswer = null;
      
      const ADMIN_ID = 8616193014;
      const userId = tg?.initDataUnsafe?.user?.id || ADMIN_ID;
      const isAdmin = userId === ADMIN_ID;
      
      // Initialize Supabase
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        console.log('✅ Supabase initialized');
      } catch (e) {
        console.error('❌ Supabase error:', e);
        showError('Supabase initialization failed: ' + e.message);
        return;
      }
      
      function showError(msg) {
        document.getElementById('main').innerHTML = `
          <div class="error-box">
            <h3>❌ Ikibazo</h3>
            <p>${msg}</p>
            <button class="primary" onclick="location.reload()" style="margin-top: 16px;">🔄 Ongera Ugerageze</button>
          </div>
        `;
      }
      
      // Test connection
      async function testConnection() {
        try {
          const start = Date.now();
          const { data, error, count } = await supabase
            .from('questions')
            .select('*', { count: 'exact', head: true });
          
          const ping = Date.now() - start;
          
          if (error) {
            console.error('Connection error:', error);
            return { success: false, error: error.message, count: 0, ping: 0 };
          }
          
          return { success: true, error: null, count: count || 0, ping };
        } catch (e) {
          console.error('Test failed:', e);
          return { success: false, error: e.message, count: 0, ping: 0 };
        }
      }
      
      // Show main menu
      async function showMainMenu() {
        document.getElementById('main').innerHTML = '<div class="loading"><p>⏳ Tugerageza kwihuza...</p></div>';
        
        const result = await testConnection();
        
        let html = '';
        
        if (result.success) {
          html += `
            <div class="success-box">
              <h3>✅ Database irahari!</h3>
              <p>Ping: ${result.ping}ms | Ibibazo: ${result.count}</p>
            </div>
          `;
        } else {
          html += `
            <div class="error-box">
              <h3>❌ Database ntabwo ibonetse</h3>
              <p>${result.error}</p>
              <p style="margin-top: 8px; font-size: 14px;">
                Ukeneye: 1) Kurema table "questions" 2) Gushyiraho RLS policies
              </p>
            </div>
          `;
        }
        
        html += `
          <div class="card" onclick="window.goTo('lessons')">
            <h3>📚 Amasomo y'Ibyapa</h3>
            <p style="color: #94a3b8; margin-top: 8px;">Menya ibimenyetso by'umuhanda</p>
          </div>
          <div class="card" onclick="window.goTo('quiz')">
            <h3>❓ Quiz (5 ibibazo)</h3>
            <p style="color: #94a3b8; margin-top: 8px;">Ikizamini kigufi cyo kwitoza</p>
          </div>
          <div class="card" onclick="window.goTo('exam')">
            <h3>📝 Mock Exam (15 ibibazo)</h3>
            <p style="color: #94a3b8; margin-top: 8px;">Ikizamini gishyitse nk'icy'ukuri</p>
          </div>
          <div class="card" onclick="window.goTo('premium')">
            <h3>💎 Premium</h3>
            <p style="color: #94a3b8; margin-top: 8px;">Fungura ibindi bintu byose</p>
          </div>
          ${isAdmin ? `
            <div class="card" style="background: #22c55e;" onclick="window.showAdminPanel()">
              <h3>👑 ADMIN PANEL</h3>
              <p style="color: #fff; margin-top: 8px;">Genzura ibibazo</p>
            </div>
          ` : ''}
        `;
        
        document.getElementById('main').innerHTML = html;
      }
      
      window.goTo = async function(page) {
        if (page === 'quiz' || page === 'exam') {
          const limit = page === 'quiz' ? 5 : 15;
          
          document.getElementById('main').innerHTML = '<div class="loading"><p>⏳ Gukura ibibazo...</p></div>';
          
          try {
            const { data: questions, error } = await supabase
              .from('questions')
              .select('*')
              .limit(limit);
            
            if (error) throw error;
            
            if (!questions || questions.length === 0) {
              alert('❌ Nta bibazo bihari. Ongeramo muri Admin Panel.');
              showMainMenu();
              return;
            }
            
            startQuiz(questions.sort(() => Math.random() - 0.5));
          } catch (err) {
            alert('❌ Error: ' + err.message);
            showMainMenu();
          }
        } else if (page === 'premium') {
          alert('💎 Premium: 5,000 RWF\nMoMo: *182*8*1*0706405# (Lambert)');
        } else if (page === 'lessons') {
          showLessons();
        }
      };
      
      function showLessons() {
        document.getElementById('main').innerHTML = `
          <div class="card">
            <h3>📚 Ibimenyetso by'Umuhanda</h3>
            <p>🔴 Umutuku: Itegeko (STOP)</p>
            <p>🟡 Umuhondo: Iburira (ishuri)</p>
            <p>🔵 Ubururu: Amakuru (hospital)</p>
          </div>
          <div class="card">
            <h3>🚦 Amatara</h3>
            <p>🔴 Hagarara | 🟡 Itegereze | 🟢 Genda</p>
          </div>
          <button class="primary" onclick="showMainMenu()">← Subira Ahabanza</button>
        `;
      }
      
      function startQuiz(questions) {
        currentQuestions = questions;
        currentIndex = 0;
        score = 0;
        selectedAnswer = null;
        showQuestion();
      }
      
      function showQuestion() {
        const q = currentQuestions[currentIndex];
        const options = q.options.split('\n').map(o => o.trim()).filter(o => o);
        const progress = (currentIndex / currentQuestions.length) * 100;
        
        let html = `
          <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
              <span>Ikibazo ${currentIndex + 1}/${currentQuestions.length}</span>
              <span>Amanota: ${score}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <h3 style="margin: 20px 0;">${q.question}</h3>
        `;
        
        options.forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          html += `<button class="option" onclick="window.selectAnswer('${letter}', this)">${opt}</button>`;
        });
        
        html += `
            <button class="primary" onclick="window.nextQuestion()" id="nextBtn" style="display: none;">Komeza →</button>
          </div>
        `;
        
        document.getElementById('main').innerHTML = html;
      }
      
      window.selectAnswer = function(answer, btn) {
        if (selectedAnswer !== null) return;
        
        selectedAnswer = answer;
        const q = currentQuestions[currentIndex];
        const isCorrect = answer === q.correct;
        
        if (isCorrect) {
          score++;
          btn.classList.add('correct');
        } else {
          btn.classList.add('wrong');
          const options = document.querySelectorAll('.option');
          q.options.split('\n').forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            if (letter === q.correct) {
              options[idx].classList.add('correct');
            }
          });
        }
        
        document.querySelectorAll('.option').forEach(b => {
          b.disabled = true;
          b.style.cursor = 'not-allowed';
        });
        
        document.getElementById('nextBtn').style.display = 'block';
      };
      
      window.nextQuestion = function() {
        currentIndex++;
        
        if (currentIndex < currentQuestions.length) {
          selectedAnswer = null;
          showQuestion();
        } else {
          showResults();
        }
      };
      
      function showResults() {
        const percent = Math.round((score / currentQuestions.length) * 100);
        const passed = percent >= 60;
        
        document.getElementById('main').innerHTML = `
          <div class="card" style="text-align: center;">
            <h2>🎯 Ibisubizo</h2>
            <div style="font-size: 64px; font-weight: bold; color: ${passed ? '#22c55e' : '#ef4444'}; margin: 20px 0;">
              ${score}/${currentQuestions.length}
            </div>
            <p style="font-size: 28px;">${percent}%</p>
            <p style="margin: 20px 0;">${passed ? '✅ Watsinze!' : '📚 Komeza wige'}</p>
            <button class="primary" onclick="showMainMenu()">← Subira Ahabanza</button>
            <button class="option" style="text-align: center; margin-top: 12px;" onclick="startQuiz(currentQuestions)">🔄 Ongera Ugerageze</button>
          </div>
        `;
      }
      
      window.showAdminPanel = function() {
        document.getElementById('main').innerHTML = `
          <div class="card">
            <h3>➕ Ongera Ikibazo</h3>
            <textarea id="q" placeholder="Ikibazo..." rows="3"></textarea>
            <textarea id="o" placeholder="A. Igisubizo 1&#10;B. Igisubizo 2&#10;C. Igisubizo 3&#10;D. Igisubizo 4" rows="5"></textarea>
            <input id="c" placeholder="A, B, C, cyangwa D" maxlength="1">
            <button class="primary" onclick="window.addQuestion()">✅ Bika Ikibazo</button>
          </div>
          <button class="primary" onclick="showMainMenu()">← Subira Ahabanza</button>
        `;
      };
      
      window.addQuestion = async function() {
        const question = document.getElementById('q').value.trim();
        const options = document.getElementById('o').value.trim();
        const correct = document.getElementById('c').value.trim().toUpperCase();
        
        if (!question || !options || !correct) {
          alert('Uzuza byose!');
          return;
        }
        
        if (!['A', 'B', 'C', 'D'].includes(correct)) {
          alert('Igisubizo kigomba kuba A, B, C, cyangwa D');
          return;
        }
        
        try {
          const { error } = await supabase
            .from('questions')
            .insert([{ question, options, correct }]);
          
          if (error) throw error;
          
          alert('✅ Ikibazo cyongewe!');
          showAdminPanel();
        } catch (err) {
          alert('❌ Error: ' + err.message);
        }
      };
      
      // Make functions global
      window.showMainMenu = showMainMenu;
      window.startQuiz = startQuiz;
      
      // Start app
      showMainMenu();
    })();
  </script>
</body>
</html>
