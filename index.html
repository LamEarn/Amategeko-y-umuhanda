<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amategeko y'Umuhanda</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; }
    .header { background: #1e40af; padding: 18px; text-align: center; font-size: 22px; font-weight: 600; }
    .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 18px; margin: 12px 0; }
    button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; }
    .primary { background: #22c55e; color: black; }
  </style>
</head>
<body>
  <div class="header">🚗 Amategeko y'Umuhanda</div>
  <div class="container" id="main"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();

    const ADMIN_ID = 8616193014;
    const userId = tg.initDataUnsafe?.user?.id || 8616193014;
    const isAdmin = userId === ADMIN_ID;

    // ================== SUPABASE CONFIG ==================
    const SUPABASE_URL = "https://YOUR_SUPABASE_URL.supabase.co";     // ← CHANGE
    const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";                   // ← CHANGE

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ================== RENDER MENU ==================
    async function showMainMenu() {
      let html = `
        <div class="card" onclick="goTo('lessons')">📚 Amasomo y'Ibyapa</div>
        <div class="card" onclick="goTo('quiz')">❓ Quiz (5 ibibazo)</div>
        <div class="card" onclick="goTo('exam')">📝 Mock Exam (15 ibibazo)</div>
        <div class="card" onclick="goTo('premium')">💎 Premium - Unlimited Access</div>`;

      if (isAdmin) {
        html += `<div class="card" style="background:#22c55e;color:black" onclick="showAdminPanel()">👑 ADMIN PANEL</div>`;
      }

      document.getElementById('main').innerHTML = html;
    }

    // ================== REAL QUIZ (From Database) ==================
    async function startRealQuiz(num = 15) {
      const { data: questions } = await supabase
        .from('questions')
        .select('*')
        .limit(num);

      if (!questions || questions.length === 0) {
        tg.showAlert("No questions yet. Admin should add some.");
        return;
      }

      // Simple demo of real quiz (you can expand)
      let score = 0;
      tg.showAlert(`✅ ${num} questions loaded from database!\n\nReal quiz starting...`);
      // Here you can build full quiz UI with options
    }

    function goTo(page) {
      if (page === 'quiz' || page === 'exam') {
        startRealQuiz(page === 'quiz' ? 5 : 15);
      } else if (page === 'premium') {
        tg.showAlert("Premium: Pay 5000 RWF to 706405 then send screenshot on WhatsApp");
      } else {
        tg.showAlert(`Opening ${page}...`);
      }
    }

    // ================== ADMIN PANEL (Real) ==================
    function showAdminPanel() {
      document.getElementById('main').innerHTML = `
        <h2 style="text-align:center; color:#22c55e;">👑 Admin Panel</h2>
        <div class="card">
          <h3>Add Question</h3>
          <textarea id="qtext" placeholder="Full Question" rows="3"></textarea>
          <input type="text" id="options" placeholder="A. opt1\nB. opt2\nC. opt3\nD. opt4">
          <input type="text" id="correct" placeholder="Correct Answer (A/B/C/D)">
          <button class="primary" onclick="addQuestion()">Save Question</button>
        </div>
        <button onclick="showMainMenu()">← Back</button>
      `;
    }

    async function addQuestion() {
      const question = document.getElementById('qtext').value;
      const options = document.getElementById('options').value;
      const correct = document.getElementById('correct').value.toUpperCase();

      if (!question || !correct) {
        tg.showAlert("Question and correct answer required!");
        return;
      }

      const { error } = await supabase
        .from('questions')
        .insert([{ question, options, correct, explanation: "Admin added" }]);

      if (error) tg.showAlert("Error: " + error.message);
      else tg.showAlert("✅ Question added successfully!");
    }

    // Initialize
    showMainMenu();
    tg.BackButton.onClick(() => tg.close());
  </script>
</body>
</html>
